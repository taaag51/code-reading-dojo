name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check
        run: python -m py_compile dojo.py

      - name: Install
        run: pip install -e .

      - name: Import check
        run: python -c "import dojo; print('import OK')"

      - name: CLI help
        run: python dojo.py --help
